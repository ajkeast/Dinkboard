name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  client:
    name: Client build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - name: Production build (same-origin API)
        run: npm run build
        env:
          VITE_API_BASE_URL: ""

  server-test:
    name: Server tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    # Ephemeral MySQL — GitHub runners cannot reach PebbleHost remote DB.
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test
          MYSQL_DATABASE: dinkboard_ci
          MYSQL_USER: dinkboard
          MYSQL_PASSWORD: dinkboard
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -ptest"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      SQL_HOST: 127.0.0.1
      SQL_USER: dinkboard
      SQL_PASSWORD: dinkboard
      SQL_DATABASE: dinkboard_ci
      JWT_SECRET: ci-only-jwt-secret-not-for-production
      CORS_ORIGIN: http://localhost:3000
      CLIENT_URL: http://localhost:3000
      NODE_ENV: test
      CI: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - name: Run migrations
        run: npm run migrate
      - name: Run vitest (auth + unit; Discord data suite skipped in CI)
        run: npm test
