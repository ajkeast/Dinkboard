name: CI

# Gate merges only — do not re-run on main after merge.
on:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  client:
    name: Client build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: Production build (same-origin API)
        run: npm run build -w client
        env:
          VITE_API_BASE_URL: ""

  server-test:
    name: Server tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: Check DB secrets present
        env:
          SQL_HOST: ${{ secrets.SQL_HOST }}
          SQL_USER: ${{ secrets.SQL_USER }}
          SQL_PASSWORD: ${{ secrets.SQL_PASSWORD }}
          SQL_DATABASE: ${{ secrets.SQL_DATABASE }}
        run: |
          node --input-type=module <<'EOF'
          const keys = ['SQL_HOST', 'SQL_USER', 'SQL_PASSWORD', 'SQL_DATABASE'];
          let ok = true;
          for (const k of keys) {
            const v = process.env[k] ?? '';
            const trimmed = v.replace(/^['"]|['"]$/g, '').trim();
            console.log(`${k}: length=${v.length} quoted=${/^['"]/.test(v.trim())} empty=${trimmed.length === 0}`);
            if (!trimmed) ok = false;
          }
          if (!ok) {
            console.error('One or more SQL_* secrets are missing/empty. Re-add them in repo Settings → Secrets (no quotes).');
            process.exit(1);
          }
          EOF
      - name: Run migrations
        run: npm run migrate
        env:
          SQL_HOST: ${{ secrets.SQL_HOST }}
          SQL_USER: ${{ secrets.SQL_USER }}
          SQL_PASSWORD: ${{ secrets.SQL_PASSWORD }}
          SQL_DATABASE: ${{ secrets.SQL_DATABASE }}
      - name: Run vitest
        run: npm test
        env:
          NODE_ENV: test
          SQL_HOST: ${{ secrets.SQL_HOST }}
          SQL_USER: ${{ secrets.SQL_USER }}
          SQL_PASSWORD: ${{ secrets.SQL_PASSWORD }}
          SQL_DATABASE: ${{ secrets.SQL_DATABASE }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          CORS_ORIGIN: http://localhost:3000
          CLIENT_URL: http://localhost:3000
