# Production stack — used behind the shared Caddy edge proxy.
# From repo root on the VPS:
#   docker network create edge   # once
#   docker compose -f docker-compose.prod.yml up --build -d

services:
  client:
    container_name: dinkboard-client
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
    restart: unless-stopped
    depends_on:
      - server
    networks:
      - dinkboard
      - edge

  server:
    container_name: dinkboard-server
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: production
      PORT: "5000"
      COOKIE_SECURE: "true"
      CORS_ORIGIN: "https://dinkscord.com,https://www.dinkscord.com"
      CLIENT_URL: "https://dinkscord.com"
      DISCORD_REDIRECT_URI: "https://dinkscord.com/api/auth/discord/callback"
    networks:
      - dinkboard

networks:
  dinkboard:
    driver: bridge
  edge:
    external: true
